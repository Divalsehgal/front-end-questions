<!--                   <script>	                  <script async>	            <script defer>
  Parsing behavior	   Blocks HTML parsing	      Runs parallel to parsing	  Runs parallel to parsing
  Execution order	     In order of appearance	    Not guaranteed	            In order of appearance
  DOM dependency	     No	                        No	                        Yes (waits for DOM) 
  Usage                                             analytics and ads scripts.         
  
  -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preload" href="./script4.js" as="script" /> <!-- preloading imp resource as script  -->
  <title>Async and Defer Example</title>
  <meta name="theme-color" content="#226DAA" />
  <script async src="./script1.js"></script> <!-- async -->
  <script defer src="./script2.js"></script> <!-- deferred -->


</head>


<body>
  <h1>Async and Defer Example</h1>
  <script>
    console.log("script3");
  </script> <!-- inline -->
</body>

</html>

<!-- 
1.The async attribute should be used for scripts that are not critical to the initial 
rendering of the page and do not depend on each other,
while the defer attribute should be used 
for scripts that depend on / is depended on by another script.

2.The async and defer attributes are ignored for scripts that have no src attribute.
<script> with defer or async that contain document.write() will be ignored with a 
message like "A call to document.write() from an asynchronously-loaded external 
script was ignored".

3.Even though async and defer help to make script downloading asynchronous,
the scripts are still eventually executed on the main thread. 

-->
