< !doctype html >
<html>
  <head>
    <title>Deferred Script</title>
  </head>
  <body>
    <!-- Content before the script -->
    <h1>Deferred Script Example</h1>
    <p>This content will be rendered before the deferred script executes.</p>
    <!-- 
        Similar to <script async>, <script defer> also downloads the script in parallel 
        to HTML parsing but the script is only executed when the document has been 
        fully parsed and before firing DOMContentLoaded.
        If there are multiple of them, each deferred script is executed in the order 
        they appeared in the HTML document.
        If a script relies on a fully-parsed DOM, 
        the defer attribute will be useful in ensuring that the HTML is fully 
        parsed before executing. -->

    <!-- Deferred script -->
    <script defer src="deferred.js"></script>

    <!-- Content after the script -->
    <p>This content will be rendered before the deferred script executes.</p>
  </body>
</html>
